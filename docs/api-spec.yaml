openapi: 3.0.3
info:
  title: HerLoop API
  description: HerLoop 她循环 - 女性社群闲置交易平台后端接口
  version: 1.0.0
  contact:
    name: HerLoop Team

servers:
  - url: http://localhost:8080/api
    description: 本地开发环境

tags:
  - name: Auth
    description: 认证相关（注册、登录）
  - name: User
    description: 用户信息
  - name: Product
    description: 商品（闲置）
  - name: Want
    description: 求购
  - name: Trade
    description: 交易记录
  - name: Points
    description: 积分
  - name: Favorite
    description: 收藏

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: 用户注册
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nickname, password]
              properties:
                nickname:
                  type: string
                  example: 小叶
                password:
                  type: string
                  example: "123456"
                avatar:
                  type: string
                  example: "🦢"
                wechat:
                  type: string
                  example: xiaoye_wx
      responses:
        "200":
          description: 注册成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"

  /auth/login:
    post:
      tags: [Auth]
      summary: 用户登录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nickname, password]
              properties:
                nickname:
                  type: string
                  example: 小叶
                password:
                  type: string
                  example: "123456"
      responses:
        "200":
          description: 登录成功，返回 token
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          token:
                            type: string
                            example: eyJhbGciOiJIUzI1NiJ9...
                          user:
                            $ref: "#/components/schemas/UserProfile"

  /user/profile:
    get:
      tags: [User]
      summary: 获取当前用户信息
      security:
        - BearerAuth: []
      responses:
        "200":
          description: 用户信息
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/UserProfile"
    put:
      tags: [User]
      summary: 更新个人资料
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nickname:
                  type: string
                avatar:
                  type: string
                wechat:
                  type: string
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"

  /products:
    get:
      tags: [Product]
      summary: 商品列表（支持筛选、分页）
      parameters:
        - name: category
          in: query
          schema:
            type: string
            enum: [全部, 服饰, 图书, 美妆, 运动, 生活]
          description: 商品分类
        - name: tradeMode
          in: query
          schema:
            type: string
            enum: [cash, points, both]
          description: 交易方式筛选
        - name: status
          in: query
          schema:
            type: string
            enum: [on, reserved, sold]
          description: 商品状态
        - name: keyword
          in: query
          schema:
            type: string
          description: 关键词搜索
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: 商品列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PageProduct"
    post:
      tags: [Product]
      summary: 发布商品
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductCreate"
      responses:
        "200":
          description: 发布成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      tags: [Product]
      summary: 商品详情
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 商品详情
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Product"

  /products/{id}/status:
    put:
      tags: [Product]
      summary: 更新商品状态
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [on, reserved, sold]
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"

  /user/products:
    get:
      tags: [Product]
      summary: 我的商品列表
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [on, reserved, sold]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: 我的商品
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PageProduct"

  /wants:
    get:
      tags: [Want]
      summary: 求购列表
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: 求购列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PageWant"
    post:
      tags: [Want]
      summary: 发布求购
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WantCreate"
      responses:
        "200":
          description: 发布成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Want"

  /wants/{id}:
    get:
      tags: [Want]
      summary: 求购详情
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 求购详情
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Want"

  /user/wants:
    get:
      tags: [Want]
      summary: 我的求购
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: 我的求购列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PageWant"

  /user/trades:
    get:
      tags: [Trade]
      summary: 我的交易记录
      security:
        - BearerAuth: []
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [buy, sell]
          description: 交易类型（买入/卖出）
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: 交易记录
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PageTrade"

  /user/points:
    get:
      tags: [Points]
      summary: 积分余额
      security:
        - BearerAuth: []
      responses:
        "200":
          description: 积分余额
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          points:
                            type: integer
                            example: 186

  /user/points/log:
    get:
      tags: [Points]
      summary: 积分流水
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: 积分流水列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PagePointsLog"

  /favorites:
    get:
      tags: [Favorite]
      summary: 我的收藏列表
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: 收藏列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PageProduct"

  /favorites/{productId}:
    post:
      tags: [Favorite]
      summary: 添加收藏
      security:
        - BearerAuth: []
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 收藏成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"
    delete:
      tags: [Favorite]
      summary: 取消收藏
      security:
        - BearerAuth: []
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 取消成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Result:
      type: object
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: success
        data:
          type: object
          nullable: true

    UserProfile:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nickname:
          type: string
          example: 小叶
        avatar:
          type: string
          example: "🦢"
        wechat:
          type: string
          example: xiaoye_wx
        points:
          type: integer
          example: 186
        verified:
          type: boolean
          example: true
        productCount:
          type: integer
          example: 4
        tradeCount:
          type: integer
          example: 9
        createdAt:
          type: string
          format: date-time

    Product:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: 真丝睡裙 米白色
        category:
          type: string
          enum: [服饰, 图书, 美妆, 运动, 生活]
          example: 服饰
        condition:
          type: string
          example: 95新
        description:
          type: string
          example: 澳洲带回的真丝睡裙，只穿过两次...
        cashPrice:
          type: number
          example: 120
        pointsPrice:
          type: integer
          example: 0
        tradeMode:
          type: string
          enum: [cash, points, both]
          example: cash
        status:
          type: string
          enum: [on, reserved, sold]
          example: on
        icon:
          type: string
          example: dress
          description: 商品图标类型（MVP阶段），后续替换为图片URL
        createdAt:
          type: string
          format: date-time
        seller:
          $ref: "#/components/schemas/SellerBrief"

    SellerBrief:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nickname:
          type: string
          example: 小鹿
        avatar:
          type: string
          example: "🦌"
        verified:
          type: boolean
          example: true

    ProductCreate:
      type: object
      required: [title, category, condition, description, tradeMode]
      properties:
        title:
          type: string
          example: 真丝睡裙 米白色
        category:
          type: string
          enum: [服饰, 图书, 美妆, 运动, 生活]
        condition:
          type: string
          example: 95新
        description:
          type: string
        cashPrice:
          type: number
          example: 120
        pointsPrice:
          type: integer
          example: 0
        tradeMode:
          type: string
          enum: [cash, points, both]
        icon:
          type: string
          example: dress
        wechat:
          type: string
          description: 联系方式（微信号）

    Want:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: 求购 Kindle 电子书阅读器
        budget:
          type: string
          example: ¥300以内
        description:
          type: string
          example: 看书用，二手九成新即可...
        icon:
          type: string
          example: kindle
        status:
          type: string
          enum: [open, closed]
          example: open
        createdAt:
          type: string
          format: date-time
        user:
          $ref: "#/components/schemas/SellerBrief"

    WantCreate:
      type: object
      required: [title, budget, description]
      properties:
        title:
          type: string
          example: 求购 Kindle 电子书阅读器
        budget:
          type: string
          example: ¥300以内
        description:
          type: string
        icon:
          type: string
          example: kindle

    Trade:
      type: object
      properties:
        id:
          type: integer
        productId:
          type: integer
        product:
          $ref: "#/components/schemas/Product"
        type:
          type: string
          enum: [buy, sell]
        status:
          type: string
          example: 已完成
        tradeDate:
          type: string
          format: date-time

    PointsLog:
      type: object
      properties:
        id:
          type: integer
        description:
          type: string
          example: 出售「化妆刷套装」获得积分
        amount:
          type: string
          example: "+60"
        createdAt:
          type: string
          format: date-time

    PageProduct:
      type: object
      properties:
        list:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        total:
          type: integer
          example: 42
        page:
          type: integer
          example: 1
        pageSize:
          type: integer
          example: 10

    PageWant:
      type: object
      properties:
        list:
          type: array
          items:
            $ref: "#/components/schemas/Want"
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer

    PageTrade:
      type: object
      properties:
        list:
          type: array
          items:
            $ref: "#/components/schemas/Trade"
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer

    PagePointsLog:
      type: object
      properties:
        list:
          type: array
          items:
            $ref: "#/components/schemas/PointsLog"
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
