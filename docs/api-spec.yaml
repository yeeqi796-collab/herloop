openapi: 3.0.3
info:
  title: HerLoop API
  description: |
    HerLoop 她循环 — 女性社群闲置交易平台后端接口。
    所有接口返回 `{code, message, data}` 格式。分页接口使用 `PageResult<T>` 包装。
  version: 1.0.0
  contact:
    name: HerLoop Team

servers:
  - url: http://localhost:8080/api
    description: 本地开发环境

tags:
  - name: Auth
    description: 认证（注册、登录、实名认证）
  - name: User
    description: 用户资料与个人资源查询
  - name: Product
    description: 商品（闲置物品）
  - name: Want
    description: 求购
  - name: Trade
    description: 交易
  - name: Points
    description: 积分
  - name: Favorite
    description: 收藏
  - name: Notification
    description: 通知
  - name: Message
    description: 私信
  - name: Report
    description: 举报
  - name: Admin
    description: 管理后台（需 ADMIN 角色）

security:
  - BearerAuth: []

paths:
  # ── Auth ────────────────────────────────────────────────
  /auth/register:
    post:
      tags: [Auth]
      summary: 用户注册
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: 注册成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResult"

  /auth/login:
    post:
      tags: [Auth]
      summary: 用户登录
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResult"

  /auth/submit-proof:
    post:
      tags: [Auth]
      summary: 上传实名认证凭证
      description: 上传 Herstory 认证截图，需携带 JWT token。
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: 上传成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          id:
                            type: integer
                            description: 认证凭证 ID

  # ── User ────────────────────────────────────────────────
  /user/profile:
    get:
      tags: [User]
      summary: 获取当前用户信息
      responses:
        "200":
          description: 用户信息
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/UserVO"
    put:
      tags: [User]
      summary: 更新个人资料
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nickname:
                  type: string
                avatar:
                  type: string
                  description: Emoji 头像
                wechat:
                  type: string
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/UserVO"

  /user/deactivate:
    delete:
      tags: [User]
      summary: 注销账号（逻辑删除）
      responses:
        "200":
          description: 注销成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"

  /user/avatar:
    post:
      tags: [User]
      summary: 上传头像图片
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: 上传成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          url:
                            type: string

  /user/products:
    get:
      tags: [User]
      summary: 我发布的商品
      parameters:
        - $ref: "#/components/parameters/statusProduct"
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
      responses:
        "200":
          description: 商品列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PageResultProductVO"

  /user/wants:
    get:
      tags: [User]
      summary: 我发布的求购
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
      responses:
        "200":
          description: 求购列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PageResultWantVO"

  /user/trades:
    get:
      tags: [User]
      summary: 我的交易记录
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [buy, sell]
          description: 买入/卖出筛选
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSizeDefault20"
      responses:
        "200":
          description: 交易记录
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PageResultTradeVO"

  /user/points:
    get:
      tags: [User]
      summary: 积分余额
      responses:
        "200":
          description: 积分余额
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          points:
                            type: integer
                            example: 186

  /user/points/log:
    get:
      tags: [User]
      summary: 积分流水
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSizeDefault20"
      responses:
        "200":
          description: 积分流水列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PageResultPointsLogVO"

  # ── Product ─────────────────────────────────────────────
  /products:
    get:
      tags: [Product]
      summary: 商品列表（公开）
      security: []
      parameters:
        - name: category
          in: query
          schema:
            type: string
            enum: [全部, 服饰, 图书, 美妆, 运动, 生活]
        - name: tradeMode
          in: query
          schema:
            type: string
            enum: [cash, points, both]
        - name: status
          in: query
          schema:
            type: string
            enum: [on, reserved, sold]
        - name: keyword
          in: query
          schema:
            type: string
          description: 关键词搜索（FULLTEXT on title+description）
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
      responses:
        "200":
          description: 商品列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PageResultProductVO"
    post:
      tags: [Product]
      summary: 发布商品
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductCreateRequest"
      responses:
        "200":
          description: 发布成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ProductVO"

  /products/{id}:
    get:
      tags: [Product]
      summary: 商品详情（公开）
      security: []
      parameters:
        - $ref: "#/components/parameters/idPath"
      responses:
        "200":
          description: 商品详情
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ProductVO"
    delete:
      tags: [Product]
      summary: 删除商品（逻辑删除）
      parameters:
        - $ref: "#/components/parameters/idPath"
      responses:
        "200":
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"

  /products/{id}/status:
    put:
      tags: [Product]
      summary: 更新商品状态
      parameters:
        - $ref: "#/components/parameters/idPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [on, reserved, sold]
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"

  /products/{id}/images:
    post:
      tags: [Product]
      summary: 上传商品图片（最多 5 张）
      parameters:
        - $ref: "#/components/parameters/idPath"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [files]
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                  maxItems: 5
      responses:
        "200":
          description: 上传成功，返回图片 URL 列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          type: string

  # ── Want ────────────────────────────────────────────────
  /wants:
    get:
      tags: [Want]
      summary: 求购列表（公开）
      security: []
      parameters:
        - name: keyword
          in: query
          schema:
            type: string
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
      responses:
        "200":
          description: 求购列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PageResultWantVO"
    post:
      tags: [Want]
      summary: 发布求购
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WantCreateRequest"
      responses:
        "200":
          description: 发布成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/WantVO"

  /wants/{id}:
    get:
      tags: [Want]
      summary: 求购详情（公开）
      security: []
      parameters:
        - $ref: "#/components/parameters/idPath"
      responses:
        "200":
          description: 求购详情
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/WantVO"

  /wants/{id}/close:
    patch:
      tags: [Want]
      summary: 关闭求购
      parameters:
        - $ref: "#/components/parameters/idPath"
      responses:
        "200":
          description: 关闭成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"

  /wants/{id}/images:
    post:
      tags: [Want]
      summary: 上传求购图片（最多 5 张）
      parameters:
        - $ref: "#/components/parameters/idPath"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [files]
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                  maxItems: 5
      responses:
        "200":
          description: 上传成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          type: string

  # ── Trade ───────────────────────────────────────────────
  /trades:
    post:
      tags: [Trade]
      summary: 创建交易
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TradeCreateRequest"
      responses:
        "200":
          description: 交易创建成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/TradeVO"

  /trades/{id}/complete:
    put:
      tags: [Trade]
      summary: 完成交易
      description: 双方各获得 +50 积分，触发邀请奖励。
      parameters:
        - $ref: "#/components/parameters/idPath"
      responses:
        "200":
          description: 交易完成
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"

  /trades/{id}/cancel:
    put:
      tags: [Trade]
      summary: 取消交易
      description: 退还已扣除积分。
      parameters:
        - $ref: "#/components/parameters/idPath"
      responses:
        "200":
          description: 交易取消
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"

  # ── Points ──────────────────────────────────────────────
  /points/checkin:
    post:
      tags: [Points]
      summary: 每日签到
      description: 每日 +5 积分，不可重复签到。
      responses:
        "200":
          description: 签到成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          earned:
                            type: integer
                            example: 5
                          balance:
                            type: integer
                            example: 191

  /points/available:
    get:
      tags: [Points]
      summary: 可用积分（扣除过期部分）
      responses:
        "200":
          description: 可用积分
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          available:
                            type: integer
                          total:
                            type: integer

  # ── Favorite ────────────────────────────────────────────
  /favorites:
    get:
      tags: [Favorite]
      summary: 我的收藏列表
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
      responses:
        "200":
          description: 收藏列表（商品格式）
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PageResultProductVO"

  /favorites/{productId}:
    post:
      tags: [Favorite]
      summary: 添加收藏
      parameters:
        - $ref: "#/components/parameters/productIdPath"
      responses:
        "200":
          description: 收藏成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          favorited:
                            type: boolean
                            example: true
    delete:
      tags: [Favorite]
      summary: 取消收藏
      parameters:
        - $ref: "#/components/parameters/productIdPath"
      responses:
        "200":
          description: 取消成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          favorited:
                            type: boolean
                            example: false

  /favorites/check/{productId}:
    get:
      tags: [Favorite]
      summary: 检查是否已收藏
      parameters:
        - $ref: "#/components/parameters/productIdPath"
      responses:
        "200":
          description: 收藏状态
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          favorited:
                            type: boolean

  # ── Notification ────────────────────────────────────────
  /notifications:
    get:
      tags: [Notification]
      summary: 通知列表
      parameters:
        - name: unreadOnly
          in: query
          schema:
            type: boolean
          description: 仅未读
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSizeDefault20"
      responses:
        "200":
          description: 通知列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PageResultNotificationVO"

  /notifications/unread-count:
    get:
      tags: [Notification]
      summary: 未读通知数
      responses:
        "200":
          description: 未读数
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          count:
                            type: integer
                            example: 3

  /notifications/{id}/read:
    put:
      tags: [Notification]
      summary: 标记单条通知已读
      parameters:
        - $ref: "#/components/parameters/idPath"
      responses:
        "200":
          description: 标记成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"

  /notifications/read-all:
    put:
      tags: [Notification]
      summary: 全部标记已读
      responses:
        "200":
          description: 标记成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"

  # ── Message ─────────────────────────────────────────────
  /messages/conversations:
    get:
      tags: [Message]
      summary: 会话列表
      responses:
        "200":
          description: 会话列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/ConversationVO"
    post:
      tags: [Message]
      summary: 创建会话
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [targetUserId]
              properties:
                targetUserId:
                  type: integer
                productId:
                  type: integer
                  description: 关联商品（可选）
      responses:
        "200":
          description: 会话创建成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ConversationVO"

  /messages/conversations/{id}/messages:
    get:
      tags: [Message]
      summary: 会话消息列表
      parameters:
        - $ref: "#/components/parameters/idPath"
        - $ref: "#/components/parameters/page"
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: 消息列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PageResultMessageVO"
    post:
      tags: [Message]
      summary: 发送消息
      parameters:
        - $ref: "#/components/parameters/idPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
      responses:
        "200":
          description: 发送成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/MessageVO"

  /messages/conversations/{id}/read:
    put:
      tags: [Message]
      summary: 标记会话已读
      parameters:
        - $ref: "#/components/parameters/idPath"
      responses:
        "200":
          description: 标记成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"

  /messages/unread-count:
    get:
      tags: [Message]
      summary: 未读消息数
      responses:
        "200":
          description: 未读数
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          count:
                            type: integer

  # ── Report ──────────────────────────────────────────────
  /reports:
    post:
      tags: [Report]
      summary: 提交举报
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportCreateRequest"
      responses:
        "200":
          description: 举报提交成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Report"

  /reports/pending:
    get:
      tags: [Report]
      summary: 待审核举报列表
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
      responses:
        "200":
          description: 举报列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          list:
                            type: array
                            items:
                              $ref: "#/components/schemas/Report"
                          total:
                            type: integer

  /reports/{id}/audit:
    put:
      tags: [Report]
      summary: 审核举报
      parameters:
        - $ref: "#/components/parameters/idPath"
        - name: action
          in: query
          required: true
          schema:
            type: string
          description: 审核操作（confirm / dismiss）
      responses:
        "200":
          description: 审核完成
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"

  # ── Admin ───────────────────────────────────────────────
  /admin/pending-proofs:
    get:
      tags: [Admin]
      summary: 待审核认证列表
      responses:
        "200":
          description: 认证列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/ProofVO"

  /admin/audit/{id}:
    post:
      tags: [Admin]
      summary: 审核认证
      parameters:
        - $ref: "#/components/parameters/idPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [APPROVED, REJECTED]
      responses:
        "200":
          description: 审核完成
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"

  /admin/users/{id}/ban:
    post:
      tags: [Admin]
      summary: 封禁用户
      parameters:
        - $ref: "#/components/parameters/idPath"
      responses:
        "200":
          description: 封禁成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"

  /admin/users/{id}/unban:
    post:
      tags: [Admin]
      summary: 解封用户
      parameters:
        - $ref: "#/components/parameters/idPath"
      responses:
        "200":
          description: 解封成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"

  /admin/add-admin:
    post:
      tags: [Admin]
      summary: 添加管理员
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
      responses:
        "200":
          description: 添加成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"

  /admin/stats:
    get:
      tags: [Admin]
      summary: 平台统计数据
      responses:
        "200":
          description: 统计数据
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          totalUsers:
                            type: integer
                          verifiedUsers:
                            type: integer
                          totalProducts:
                            type: integer
                          activeProducts:
                            type: integer
                          soldProducts:
                            type: integer
                          totalTrades:
                            type: integer
                          pendingTrades:
                            type: integer
                          completedTrades:
                            type: integer
                          pendingProofs:
                            type: integer

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    idPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
    productIdPath:
      name: productId
      in: path
      required: true
      schema:
        type: integer
    page:
      name: page
      in: query
      schema:
        type: integer
        default: 1
    pageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        default: 10
    pageSizeDefault20:
      name: pageSize
      in: query
      schema:
        type: integer
        default: 20
    statusProduct:
      name: status
      in: query
      schema:
        type: string
        enum: [on, reserved, sold]

  schemas:
    # ── Common ──
    Result:
      type: object
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: success
        data:
          type: object
          nullable: true

    # ── Auth ──
    RegisterRequest:
      type: object
      required: [email, password, nickname]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        nickname:
          type: string
        avatar:
          type: string
          description: Emoji 头像
        wechat:
          type: string

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    LoginResult:
      allOf:
        - $ref: "#/components/schemas/Result"
        - type: object
          properties:
            data:
              type: object
              properties:
                token:
                  type: string
                user:
                  $ref: "#/components/schemas/UserVO"

    # ── User ──
    UserVO:
      type: object
      properties:
        id:
          type: integer
        nickname:
          type: string
        avatar:
          type: string
        wechat:
          type: string
        email:
          type: string
        points:
          type: integer
        verified:
          type: boolean
        inviteCode:
          type: string
        productCount:
          type: integer
        tradeCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    # ── Product ──
    ProductCreateRequest:
      type: object
      required: [title, category, condition, description, tradeMode]
      properties:
        title:
          type: string
        category:
          type: string
          enum: [服饰, 图书, 美妆, 运动, 生活]
        condition:
          type: string
          example: 95新
        description:
          type: string
        cashPrice:
          type: number
        pointsPrice:
          type: integer
        tradeMode:
          type: string
          enum: [cash, points, both]
        icon:
          type: string
        wechat:
          type: string

    ProductVO:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        category:
          type: string
        condition:
          type: string
        description:
          type: string
        cashPrice:
          type: number
        pointsPrice:
          type: integer
        tradeMode:
          type: string
          enum: [cash, points, both]
        status:
          type: string
          enum: [on, reserved, sold]
        icon:
          type: string
        imageUrls:
          type: string
          description: 逗号分隔的图片 URL
        createdAt:
          type: string
          format: date-time
        seller:
          $ref: "#/components/schemas/SellerBrief"

    SellerBrief:
      type: object
      properties:
        id:
          type: integer
        nickname:
          type: string
        avatar:
          type: string
        verified:
          type: boolean

    # ── Want ──
    WantCreateRequest:
      type: object
      required: [title, budget, description]
      properties:
        title:
          type: string
        budget:
          type: string
          example: ¥300以内
        description:
          type: string
        icon:
          type: string

    WantVO:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        budget:
          type: string
        description:
          type: string
        icon:
          type: string
        imageUrls:
          type: string
        status:
          type: string
          enum: [open, closed]
        createdAt:
          type: string
          format: date-time
        user:
          $ref: "#/components/schemas/SellerBrief"

    # ── Trade ──
    TradeCreateRequest:
      type: object
      required: [productId]
      properties:
        productId:
          type: integer

    TradeVO:
      type: object
      properties:
        id:
          type: integer
        productId:
          type: integer
        product:
          $ref: "#/components/schemas/ProductVO"
        type:
          type: string
          enum: [buy, sell]
        status:
          type: string
        pointsPaid:
          type: integer
          description: 本次交易消耗的积分
        tradeDate:
          type: string
          format: date-time

    # ── Points ──
    PointsLogVO:
      type: object
      properties:
        id:
          type: integer
        description:
          type: string
        amount:
          type: string
          example: "+60"
        expireAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    # ── Notification ──
    NotificationVO:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
        content:
          type: string
        read:
          type: boolean
        createdAt:
          type: string
          format: date-time

    # ── Message ──
    ConversationVO:
      type: object
      properties:
        id:
          type: integer
        otherUser:
          $ref: "#/components/schemas/SellerBrief"
        lastMessage:
          type: string
        lastMessageTime:
          type: string
          format: date-time
        unreadCount:
          type: integer

    MessageVO:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        senderId:
          type: integer
        content:
          type: string
        createdAt:
          type: string
          format: date-time

    # ── Report ──
    ReportCreateRequest:
      type: object
      required: [targetType, targetId, reason]
      properties:
        targetType:
          type: string
          enum: [user, product]
        targetId:
          type: integer
        reason:
          type: string

    Report:
      type: object
      properties:
        id:
          type: integer
        reporterId:
          type: integer
        targetType:
          type: string
        targetId:
          type: integer
        reason:
          type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time

    # ── Admin ──
    ProofVO:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        fileUrl:
          type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time

    # ── Paginated wrappers ──
    PageResultProductVO:
      type: object
      properties:
        list:
          type: array
          items:
            $ref: "#/components/schemas/ProductVO"
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer

    PageResultWantVO:
      type: object
      properties:
        list:
          type: array
          items:
            $ref: "#/components/schemas/WantVO"
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer

    PageResultTradeVO:
      type: object
      properties:
        list:
          type: array
          items:
            $ref: "#/components/schemas/TradeVO"
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer

    PageResultPointsLogVO:
      type: object
      properties:
        list:
          type: array
          items:
            $ref: "#/components/schemas/PointsLogVO"
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer

    PageResultNotificationVO:
      type: object
      properties:
        list:
          type: array
          items:
            $ref: "#/components/schemas/NotificationVO"
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer

    PageResultMessageVO:
      type: object
      properties:
        list:
          type: array
          items:
            $ref: "#/components/schemas/MessageVO"
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
